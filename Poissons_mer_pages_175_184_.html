// ========== FONCTIONS DYNAMIQUES ==========
function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }
function formatDuration(min) { if (min < 60) return min.toString(); let h = Math.floor(min/60), m = min%60; return m===0 ? h+"h" : h+"h"+m; }
function parseDurationToMinutes(str) { if (typeof str !== 'string') return parseInt(str); str=str.trim().toLowerCase(); if (/^\d+$/.test(str)) return parseInt(str); const m = str.match(/^(\d+)(?:h|:)?(\d{1,2})?$/); if(m){ let h=parseInt(m[1]), mn=m[2]?parseInt(m[2]):0; return h*60+mn; } return NaN; }

let currentItemId = null;
let currentPortions = 12;
let coeffVente = 3.5;
let autoTimes = true;
let currentPrepRaw, currentCookRaw, currentDressRaw;
let ingredientsData = [];
let defaultIngredients = [];
let defaultPrep, defaultDress;

let ficheContainer, prepInput, cookInput, dressInput, autoCheckbox, portionsInput, coeffInput, portionLabel, qtyLabels, totalCostSpan, costPerPortionSpan, sellingPriceSpan, marginPercentSpan, totalIngCostSpan, marginBar, tbody;

function renderIngredientTable() {
  tbody.innerHTML = '';
  for(let i=0; i<ingredientsData.length; i++) {
    const ing = ingredientsData[i];
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:600">${escapeHtml(ing.name)}<\/td>
      <td><input type="number" class="ni qty" data-idx="${i}" value="${ing.qty.toFixed(2)}" step="0.01" style="width:85px;"> <span class="small-unit">${ing.unit}</span><\/td>
      <td><input type="number" class="ni a" data-idx="${i}" value="${ing.priceUnit.toFixed(2)}" step="0.10" style="width:78px;"><\/td>
      <td class="unit-price-display" style="text-align:right">${ing.priceUnit.toFixed(2)} €/unit<\/td>
      <td class="line-total" style="text-align:right;font-weight:600">${(ing.qty * ing.priceUnit).toFixed(2)} €<\/td>
    `;
    tbody.appendChild(tr);
    tr.querySelector('.qty').addEventListener('input', () => updateFromInputs());
    tr.querySelector('.a').addEventListener('input', () => updateFromInputs());
  }
}

function updateFromInputs() {
  const rows = tbody.querySelectorAll('tr');
  for(let i=0; i<rows.length; i++) {
    const row = rows[i];
    const qty = parseFloat(row.querySelector('.qty').value) || 0;
    const price = parseFloat(row.querySelector('.a').value) || 0;
    ingredientsData[i].qty = qty;
    ingredientsData[i].priceUnit = price;
    row.querySelector('.unit-price-display').innerText = price.toFixed(2)+' €/unit';
    row.querySelector('.line-total').innerText = (qty * price).toFixed(2)+' €';
  }
  updateAllCosts();
}

function updateAllCosts() {
  let total = 0;
  for(let ing of ingredientsData) total += ing.qty * ing.priceUnit;
  const costPer = total / currentPortions;
  const pvTotal = costPer * coeffVente * currentPortions;
  const margin = (pvTotal - total) / pvTotal * 100;
  totalCostSpan.innerText = total.toFixed(2)+' €';
  costPerPortionSpan.innerText = costPer.toFixed(2)+' €';
  sellingPriceSpan.innerText = pvTotal.toFixed(2)+' €';
  marginPercentSpan.innerText = margin.toFixed(1)+'%';
  totalIngCostSpan.innerText = total.toFixed(2)+' €';
  if(marginBar) {
    let w = Math.min(100, Math.max(0, margin));
    marginBar.style.width = w+'%';
    marginBar.style.background = margin>65?'#1D9E75':(margin>40?'#EF9F27':'#E24B4A');
  }
}

function applyAutoTimes() {
  if(!autoTimes) return;
  const ratio = currentPortions / 12;
  currentPrepRaw = Math.round(defaultPrep * ratio);
  currentDressRaw = Math.round(defaultDress * ratio);
  syncTimesToUI();
}
function syncTimesToUI() { if(prepInput) prepInput.value = formatDuration(currentPrepRaw); if(dressInput) dressInput.value = formatDuration(currentDressRaw); if(cookInput) cookInput.value = currentCookRaw; }
function syncTimesFromUI() {
  if(prepInput) { let m = parseDurationToMinutes(prepInput.value); if(!isNaN(m)) currentPrepRaw = m; else currentPrepRaw = prepInput.value; }
  if(dressInput) { let m = parseDurationToMinutes(dressInput.value); if(!isNaN(m)) currentDressRaw = m; else currentDressRaw = dressInput.value; }
  if(cookInput) currentCookRaw = cookInput.value;
}

function updateQuantitiesByPortions() {
  const factor = currentPortions / 12;
  for(let i=0; i<ingredientsData.length; i++) ingredientsData[i].qty = defaultIngredients[i].defaultQty * factor;
  renderIngredientTable();
  updateAllCosts();
}

function loadItem(itemId) {
  const item = itemsData.find(i => i.id === itemId);
  if(!item) return;
  currentItemId = itemId;
  defaultPrep = item.prepBase;
  defaultDress = item.dressBase;
  currentPrepRaw = item.prepBase;
  currentCookRaw = item.cookBase.toString();
  currentDressRaw = item.dressBase;
  autoTimes = true;
  ingredientsData = item.ingredients.map(ing => ({ name:ing.name, unit:ing.unit, qty:ing.defaultQty, priceUnit:ing.defaultPrice }));
  defaultIngredients = item.ingredients.slice();
  currentPortions = 12;
  coeffVente = 3.5;
  ficheContainer.innerHTML = generateFicheHTML(item);
  attachDOMReferences();
  renderIngredientTable();
  updateAllCosts();
  if(autoTimes) applyAutoTimes();
  bindEvents();
  if(autoCheckbox) autoCheckbox.checked = true;
}

  prepInput = document.getElementById('prepTime');
  cookInput = document.getElementById('cookTime');
  dressInput = document.getElementById('dressTime');

  coeffInput = document.getElementById('coeffInput');
  portionLabel = document.getElementById('portionLabel');
  qtyLabels = document.querySelectorAll('.qtyBaseLabel');
  totalCostSpan = document.getElementById('totalCostValue');
  costPerPortionSpan = document.getElementById('costPerPortion');
  sellingPriceSpan = document.getElementById('sellingPriceValue');
  marginPercentSpan = document.getElementById('marginPercent');
  totalIngCostSpan = document.getElementById('totalIngCost');
  marginBar = document.getElementById('marginBar');
  tbody = document.getElementById('ingredientTbody');
}

function bindEvents() {
  if(portionsInput) portionsInput.addEventListener('input', onPortionsChange);
  if(coeffInput) coeffInput.addEventListener('input', onCoeffChange);
  if(autoCheckbox) autoCheckbox.addEventListener('change', onAutoChange);
  if(prepInput) prepInput.addEventListener('input', onTimeChange);
  if(cookInput) cookInput.addEventListener('input', onTimeChange);
  if(dressInput) dressInput.addEventListener('input', onTimeChange);
}

function onPortionsChange() { let newP = parseInt(portionsInput.value) || 1; currentPortions = newP; portionLabel.innerText = currentPortions; qtyLabels.forEach(lbl => lbl.innerText = currentPortions); updateQuantitiesByPortions(); if(autoTimes) applyAutoTimes(); saveToLocal(); }
function onCoeffChange() { coeffVente = parseFloat(coeffInput.value) || 3.0; updateAllCosts(); saveToLocal(); }
function onAutoChange() { autoTimes = autoCheckbox.checked; if(autoTimes) applyAutoTimes(); saveToLocal(); }
function onTimeChange() { syncTimesFromUI(); if(autoTimes) { autoCheckbox.checked = false; autoTimes = false; } saveToLocal(); }
function saveToLocal() { /* localStorage */ }

// Initialisation du menu
const select = document.getElementById('itemSelect');
itemsData.forEach(item => {
  const opt = document.createElement('option');
  opt.value = item.id;
  opt.textContent = `${item.nom} (p. ${item.page})`;
  select.appendChild(opt);
});
ficheContainer = document.getElementById('ficheContainer');
select.addEventListener('change', (e) => loadItem(e.target.value));
loadItem(itemsData[0].id);
</script>
