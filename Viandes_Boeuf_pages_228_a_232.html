    steps:[{t:"Préparer",d:"Dégraisser, dénerver, détailler en lames épaisses. Plonger quelques secondes dans l'eau bouillante, égoutter, éponger."},{t:"Sauter",d:"Assaisonner, rouler dans la farine, sauter vivement à la poêle (huile+beurre)."},{t:"Dresser",d:"Égoutter, saupoudrer de persil. Couvrir de sauce tomate provençale, tyrolienne, madère, etc."}], equip:["Poêle","Passoire"], allerg:["Gluten","Lait"], nut:{kcal:260,prot:22,lip:18,glu:4}, co2:"2 kg", eau:"300 L", env:55 },
  { id:"rumpsteak_anglais", nom:"Rumpsteak grillé à l'Anglaise", page:232, source:"Rumpsteak, graisse de rognon grillée, raifort", tags:["Rumpsteak","Anglais"], prepBase:5, cookBase:8, dressBase:5,
    ingredients:[{name:"Rumpsteak (tête d'aloyau)",qtyRef:0.3,unit:"kg",priceUnit:18,defaultPrice:18,defaultQty:0.3},{name:"Graisse de rognon grillée",qtyRef:0.03,unit:"kg",priceUnit:2,defaultPrice:2,defaultQty:0.03},{name:"Raifort en copeaux",qtyRef:0.02,unit:"kg",priceUnit:3,defaultPrice:3,defaultQty:0.02}],
    steps:[{t:"Griller",d:"Saisir le rumpsteak au grill."},{t:"Dresser",d:"Le dresser sur plat chaud, placer dessus la graisse de rognon grillée."},{t:"Servir",d:"Raifort en copeaux à part."}], equip:["Grill"], allerg:["Aucun"], nut:{kcal:400,prot:28,lip:32,glu:1}, co2:"3 kg", eau:"420 L", env:68 },
  { id:"tripees", nom:"Tripes (gras-double et tripes)", page:232, source:"Préparation à suivre (renvoi)", tags:["Tripes"], prepBase:10, cookBase:0, dressBase:0,
    ingredients:[{name:"Gras-double et tripes",qtyRef:1,unit:"kg",priceUnit:6,defaultPrice:6,defaultQty:1}],
    steps:[{t:"Référence",d:"Voir recettes spécifiques aux tripes (pages suivantes). Les tripes comprennent le gras-double et les tripes proprement dites."}], equip:[], allerg:["Aucun"], nut:{kcal:180,prot:18,lip:12,glu:0}, co2:"1.8 kg", eau:"250 L", env:48 }
];

// ========== FONCTIONS DYNAMIQUES (gestion des portions, coûts, etc.) ==========
function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }
function formatDuration(min) { if (min < 60) return min.toString(); let h = Math.floor(min/60), m = min%60; return m===0 ? h+"h" : h+"h"+m; }
function parseDurationToMinutes(str) { if (typeof str !== 'string') return parseInt(str); str=str.trim().toLowerCase(); if (/^\d+$/.test(str)) return parseInt(str); const m = str.match(/^(\d+)(?:h|:)?(\d{1,2})?$/); if(m){ let h=parseInt(m[1]), mn=m[2]?parseInt(m[2]):0; return h*60+mn; } return NaN; }

let currentItemId = null, currentPortions = 12, coeffVente = 3.5, autoTimes = true;
let currentPrepRaw, currentCookRaw, currentDressRaw, ingredientsData = [], defaultIngredients = [], defaultPrep, defaultDress;
let ficheContainer, prepInput, cookInput, dressInput, autoCheckbox, portionsInput, coeffInput, portionLabel, qtyLabels, totalCostSpan, costPerPortionSpan, sellingPriceSpan, marginPercentSpan, totalIngCostSpan, marginBar, tbody;

function renderIngredientTable() {
  tbody.innerHTML = '';
  for(let i=0; i<ingredientsData.length; i++) {
    const ing = ingredientsData[i];
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:600">${escapeHtml(ing.name)}<\/td>
      <td><input type="number" class="ni qty" data-idx="${i}" value="${ing.qty.toFixed(2)}" step="0.01" style="width:85px;"> <span>${ing.unit}<\/span><\/td>
      <td><input type="number" class="ni a" data-idx="${i}" value="${ing.priceUnit.toFixed(2)}" step="0.10" style="width:78px;"><\/td>
      <td class="unit-price-display" style="text-align:right">${ing.priceUnit.toFixed(2)} €/unit<\/td>
      <td class="line-total" style="text-align:right;font-weight:600">${(ing.qty * ing.priceUnit).toFixed(2)} €<\/td>
    `;
    tbody.appendChild(tr);
    tr.querySelector('.qty').addEventListener('input', () => updateFromInputs());
    tr.querySelector('.a').addEventListener('input', () => updateFromInputs());
  }
}
function updateFromInputs() {
  const rows = tbody.querySelectorAll('tr');
  for(let i=0; i<rows.length; i++) {
    const row = rows[i];
    const qty = parseFloat(row.querySelector('.qty').value) || 0;
    const price = parseFloat(row.querySelector('.a').value) || 0;
    ingredientsData[i].qty = qty;
    ingredientsData[i].priceUnit = price;
    row.querySelector('.unit-price-display').innerText = price.toFixed(2)+' €/unit';
    row.querySelector('.line-total').innerText = (qty * price).toFixed(2)+' €';
  }
  updateAllCosts();
}
function updateAllCosts() {
  let total = 0;
  for(let ing of ingredientsData) total += ing.qty * ing.priceUnit;
  const costPer = total / currentPortions;
  const pvTotal = costPer * coeffVente * currentPortions;
  const margin = (pvTotal - total) / pvTotal * 100;
  totalCostSpan.innerText = total.toFixed(2)+' €';
  costPerPortionSpan.innerText = costPer.toFixed(2)+' €';
  sellingPriceSpan.innerText = pvTotal.toFixed(2)+' €';
  marginPercentSpan.innerText = margin.toFixed(1)+'%';
  totalIngCostSpan.innerText = total.toFixed(2)+' €';
  if(marginBar) {
    let w = Math.min(100, Math.max(0, margin));
    marginBar.style.width = w+'%';
    marginBar.style.background = margin>65?'#1D9E75':(margin>40?'#EF9F27':'#E24B4A');
  }
}
function applyAutoTimes() { if(!autoTimes) return; const ratio = currentPortions / 12; currentPrepRaw = Math.round(defaultPrep * ratio); currentDressRaw = Math.round(defaultDress * ratio); syncTimesToUI(); }
function syncTimesToUI() { if(prepInput) prepInput.value = formatDuration(currentPrepRaw); if(dressInput) dressInput.value = formatDuration(currentDressRaw); if(cookInput) cookInput.value = currentCookRaw; }
function syncTimesFromUI() { if(prepInput) { let m = parseDurationToMinutes(prepInput.value); if(!isNaN(m)) currentPrepRaw = m; else currentPrepRaw = parseInt(prepInput.value)||0; } if(dressInput) { let m = parseDurationToMinutes(dressInput.value); if(!isNaN(m)) currentDressRaw = m; else currentDressRaw = parseInt(dressInput.value)||0; } if(cookInput) currentCookRaw = cookInput.value; }
function updateQuantitiesByPortions() { const factor = currentPortions / 12; for(let i=0;i<ingredientsData.length;i++) ingredientsData[i].qty = defaultIngredients[i].defaultQty * factor; renderIngredientTable(); updateAllCosts(); }
function loadItem(itemId) {
  const item = itemsData.find(i => i.id === itemId);
  if(!item) return;
  currentItemId = itemId;
  defaultPrep = item.prepBase; defaultDress = item.dressBase;
  currentPrepRaw = item.prepBase; currentCookRaw = item.cookBase.toString(); currentDressRaw = item.dressBase;
  autoTimes = true;
  ingredientsData = item.ingredients.map(ing => ({ name:ing.name, unit:ing.unit, qty:ing.defaultQty, priceUnit:ing.defaultPrice }));
  defaultIngredients = item.ingredients.slice();
  currentPortions = 12; coeffVente = 3.5;
  ficheContainer.innerHTML = generateFicheHTML(item);
  attachDOMReferences();
  renderIngredientTable();
  updateAllCosts();
  if(autoTimes) applyAutoTimes();
  bindEvents();
  if(autoCheckbox) autoCheckbox.checked = true;
}
function generateFicheHTML(item) {
  document.getElementById('anchor-target').id = 'fiche-' + item.id;
  if(history.replaceState) history.replaceState(null, '', '#fiche-' + item.id);
  const stepsHtml = item.steps.map((s,i) => `<div class="step"><div class="snum">${i+1}</div><div><div class="stitle">${escapeHtml(s.t)}</div><div class="sdesc">${escapeHtml(s.d)}</div></div></div>`).join('');
  const tagsHtml = item.tags.map(t => `<span class="tag tag-amber">${escapeHtml(t)}</span>`).join('');
  const equipHtml = item.equip.map(e => `<span class="tag tag-gray">${escapeHtml(e)}</span>`).join('');
  const allergHtml = item.allerg.map(a => `<span class="tag tag-red">⚠ ${escapeHtml(a)}</span>`).join('');
  return `<div class="fiche-header"><div class="title-row"><div class="main-title">${escapeHtml(item.nom)}</div><div class="reference">MA CUISINE · Page ${item.page}</div></div><div class="fiche-source">${escapeHtml(item.source)}</div><div class="tags">${tagsHtml}</div></div>
    <div class="two-col"><div class="card"><div class="clabel">⏱ TEMPS</div><div class="time-grid"><div class="time-label">Préparation</div><input type="text" id="prepTime" class="time-input" value="${item.prepBase}"><div class="time-unit">min</div></div>
    <div class="time-grid"><div class="time-label">Cuisson</div><input type="text" id="cookTime" class="time-input" value="${item.cookBase}"><div class="time-unit">min</div></div>
    <div class="time-grid"><div class="time-label">Montage / dressage</div><input type="text" id="dressTime" class="time-input" value="${item.dressBase}"><div class="time-unit">min</div></div>
    <div class="check-row"><input type="checkbox" id="autoTimesCheckbox" checked><span>Auto‑ajustement selon portions (préparation + montage)</span></div>
    <div class="info-time">✔️ Lorsque l’auto est coché, préparation et montage évoluent avec le nombre de couverts (base 12). La cuisson reste manuelle.</div></div>
    <div class="card"><div class="clabel">💰 Coût & marge (HT)</div><div class="ri"><span class="rl">Coût total matière</span><span class="rv" id="totalCostValue">—</span></div>
    <div class="ri"><span class="rl">Coût / portion</span><span class="rv" id="costPerPortion">—</span></div><div class="ri"><span class="rl">Prix vente HT (coef)</span><span class="rv" id="sellingPriceValue">—</span></div>
    <div class="ri"><span class="rl">Marge brute réelle</span><span class="rv" id="marginPercent">—</span></div></div></div>
    <div class="card"><div class="clabel">🥖 Ingrédients · base <span id="portionLabel">12</span> portions</div>
    <div style="display:flex; gap:1rem; align-items:center; margin-bottom:1rem; flex-wrap:wrap;"><div><span class="plbl">🍽️ Nombre de couverts</span><br><input type="number" id="portionsInput" value="12" min="1" step="1" style="width:90px; padding:6px; border-radius:20px;"></div>
    <div><span class="plbl">Coef. vente (multiplicateur)</span><br><input type="number" id="coeffInput" value="3.5" step="0.1" min="1.2" style="width:80px; padding:6px; border-radius:20px;"></div>
    <div style="flex:1"><div class="plbl">Marge réelle (barre)</div><div class="env-bar"><div id="marginBar" style="height:100%; width:0%; background:#1D9E75; border-radius:4px;"></div></div></div></div>
    <table class="ingr-table"><thead><tr><th>Ingrédient</th><th>Qté (pour <span class="qtyBaseLabel">12</span> pers)</th><th>Unité</th><th>Prix achat (€/unité)</th><th>Prix unit.</th><th>Coût total</th></tr></thead><tbody id="ingredientTbody"></tbody></table>
    <div class="ri" style="margin-top:12px;"><span class="rl">💸 COÛT TOTAL INGRÉDIENTS :</span><span class="rv" id="totalIngCost">0.00 €</span></div></div>
    <div class="card"><div class="clabel">📋 Façonnage & cuisson (d'après Escoffier)</div>${stepsHtml}</div>
    <div class="two-col"><div class="card"><div class="clabel">⚙️ Équipements essentiels</div><div class="tags-row">${equipHtml}</div></div>
    <div class="card"><div class="clabel">⚠️ Allergènes & traçabilité</div><div class="tags-row">${allergHtml}</div></div></div>
    <div class="card"><div class="clabel">🍽️ Présentation & conseil du chef</div><p style="font-size:13px;">Les pièces braisées doivent mijoter longtemps à petit feu. Servir chaud avec leurs légumes. La queue de bœuf farcie est un plat d'exception.</p></div>
    <div class="card"><div class="clabel">🧼 HACCP / PMS (recommandations)</div><p style="font-size:12px;">• Viande rassise. • Cuisson longue à cœur. • Respect des temps de saumurage. • Traçabilité des lots.</p></div>
    <div class="two-col"><div class="card"><div class="clabel">🌱 Impact environnemental (par portion)</div><div><span style="font-size:12px;">Empreinte ${item.env<35?"faible":(item.env<45?"modérée":"élevée")}</span><div class="env-bar"><div class="env-fill" style="width:${item.env}%; background:#daa153;"></div></div><div style="display:flex; gap:1rem; margin-top:6px;"><span>🌍 CO₂: ${item.co2}</span><span>💧 Eau: ${item.eau}</span></div></div></div>
    <div class="card"><div class="clabel">🍞 Valeurs nutritionnelles (par portion)</div><div class="nut-grid"><div class="nc"><div class="nv">${item.nut.kcal}</div><div class="nl">kcal</div></div><div class="nc"><div class="nv">${item.nut.prot} g</div><div class="nl">Protéines</div></div><div class="nc"><div class="nv">${item.nut.lip} g</div><div class="nl">Lipides</div></div><div class="nc"><div class="nv">${item.nut.glu} g</div><div class="nl">Glucides</div></div></div></div></div>`;
}
function attachDOMReferences() {
  prepInput = document.getElementById('prepTime'); cookInput = document.getElementById('cookTime'); dressInput = document.getElementById('dressTime');
  autoCheckbox = document.getElementById('autoTimesCheckbox'); portionsInput = document.getElementById('portionsInput'); coeffInput = document.getElementById('coeffInput');
  portionLabel = document.getElementById('portionLabel'); qtyLabels = document.querySelectorAll('.qtyBaseLabel');
  totalCostSpan = document.getElementById('totalCostValue'); costPerPortionSpan = document.getElementById('costPerPortion');
  sellingPriceSpan = document.getElementById('sellingPriceValue'); marginPercentSpan = document.getElementById('marginPercent');
  totalIngCostSpan = document.getElementById('totalIngCost'); marginBar = document.getElementById('marginBar'); tbody = document.getElementById('ingredientTbody');
}
function bindEvents() {
  if(portionsInput) portionsInput.addEventListener('input', () => { let newP = parseInt(portionsInput.value)||1; currentPortions = newP; portionLabel.innerText = currentPortions; qtyLabels.forEach(lbl=>lbl.innerText=currentPortions); updateQuantitiesByPortions(); if(autoTimes) applyAutoTimes(); });
  if(coeffInput) coeffInput.addEventListener('input', () => { coeffVente = parseFloat(coeffInput.value)||3.0; updateAllCosts(); });
  if(autoCheckbox) autoCheckbox.addEventListener('change', () => { autoTimes = autoCheckbox.checked; if(autoTimes) applyAutoTimes(); });
  if(prepInput) prepInput.addEventListener('input', () => { syncTimesFromUI(); if(autoTimes){ autoCheckbox.checked=false; autoTimes=false; } });
  if(cookInput) cookInput.addEventListener('input', () => { syncTimesFromUI(); if(autoTimes){ autoCheckbox.checked=false; autoTimes=false; } });
  if(dressInput) dressInput.addEventListener('input', () => { syncTimesFromUI(); if(autoTimes){ autoCheckbox.checked=false; autoTimes=false; } });
}

document.addEventListener('DOMContentLoaded', () => {
  const select = document.getElementById('itemSelect');
  itemsData.forEach(item => { const opt = document.createElement('option'); opt.value = item.id; opt.textContent = `${item.nom} (p. ${item.page})`; select.appendChild(opt); });
  ficheContainer = document.getElementById('ficheContainer');
  select.addEventListener('change', (e) => loadItem(e.target.value));
  const hash = window.location.hash.replace('#fiche-', '');
  const targetId = hash && itemsData.find(i => i.id === hash) ? hash : itemsData[0].id;
  select.value = targetId;
  loadItem(targetId);
});
</script>
</body>
</html>
