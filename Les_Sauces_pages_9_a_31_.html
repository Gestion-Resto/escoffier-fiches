  function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }
  function formatDuration(min) { if (min < 60) return min.toString(); let h = Math.floor(min/60), m = min%60; return m===0 ? h+"h" : h+"h"+m; }
  function parseDurationToMinutes(str) { if (typeof str !== 'string') return parseInt(str); str=str.trim().toLowerCase(); if (/^\d+$/.test(str)) return parseInt(str); const m = str.match(/^(\d+)(?:h|:)?(\d{1,2})?$/); if(m){ let h=parseInt(m[1]), mn=m[2]?parseInt(m[2]):0; return h*60+mn; } return NaN; }

        </div>
        <div class="card"><div class="clabel">🍽️ Présentation & conseil du chef</div><p style="font-size:13px;">Cette sauce s'utilise selon les recommandations classiques d'Auguste Escoffier. Pour les sauces froides, maintenir au frais. Pour les sauces chaudes, servir à bonne température.</p></div>
        <div class="card"><div class="clabel">🧼 HACCP / PMS (recommandations)</div><p style="font-size:12px;">• Respect des chaînes du froid et du chaud.<br>• Traçabilité des œufs et produits laitiers.<br>• Nettoyage rigoureux du matériel.</p></div>
        <div class="two-col">
          <div class="card"><div class="clabel">🌱 Impact environnemental (par portion)</div><div><span style="font-size:12px;">Empreinte ${sauce.env<35?"faible":(sauce.env<45?"modérée":"élevée")}</span><div class="env-bar"><div class="env-fill" style="width:${sauce.env}%; background:#daa153;"></div></div><div style="display:flex; gap:1rem; margin-top:6px;"><span>🌍 CO₂: ${sauce.co2}</span><span>💧 Eau: ${sauce.eau}</span></div></div></div>
          <div class="card"><div class="clabel">🍞 Valeurs nutritionnelles (par portion)</div><div class="nut-grid"><div class="nc"><div class="nv">${sauce.nut.kcal}</div><div class="nl">kcal</div></div><div class="nc"><div class="nv">${sauce.nut.prot} g</div><div class="nl">Protéines</div></div><div class="nc"><div class="nv">${sauce.nut.lip} g</div><div class="nl">Lipides</div></div><div class="nc"><div class="nv">${sauce.nut.glu} g</div><div class="nl">Glucides</div></div></div></div>
        </div>
      </div>
    `;
    container.insertAdjacentHTML('beforeend', ficheHTML);
  });

  // Afficher la fiche correspondant au hash URL (#fiche-XXX), ou la première par défaut
  function activateFromHash() {
    const hash = window.location.hash;
    let targetId = saucesData[0].id;
    if (hash && hash.startsWith('#fiche-')) {
      const wantedId = hash.replace('#fiche-', '');
      if (saucesData.some(s => s.id === wantedId)) targetId = wantedId;
    }
    document.querySelectorAll('.fiche').forEach(f => f.classList.remove('active'));
    const target = document.getElementById(`fiche-${targetId}`);
    if (target) target.classList.add('active');
    if (select) select.value = targetId;
  }
  activateFromHash();
  window.addEventListener('hashchange', activateFromHash);
  select.addEventListener('change', (e) => {
    document.querySelectorAll('.fiche').forEach(f => f.classList.remove('active'));
    const target = document.getElementById(`fiche-${e.target.value}`);
    if (target) target.classList.add('active');
  });

  // =====================================================================
  // INITIALISATION DES COMPORTEMENTS DYNAMIQUES (pour chaque fiche)
  // =====================================================================
  saucesData.forEach(sauce => {
    const id = sauce.id;
    const portionsInput = document.getElementById(`portions-${id}`);
    const coeffInput = document.getElementById(`coeff-${id}`);
    const autoCheckbox = document.getElementById(`auto-${id}`);
    const prepInput = document.getElementById(`prep-${id}`);
    const cookInput = document.getElementById(`cook-${id}`);
    const dressInput = document.getElementById(`dress-${id}`);
    const tbody = document.getElementById(`ingredients-${id}`);
    const portionLabel = document.getElementById(`portionLabel-${id}`);
    const qtyLabels = document.querySelectorAll(`.qtyBaseLabel-${id}`);
    const totalCostSpan = document.getElementById(`totalCost-${id}`);
    const costPerPortionSpan = document.getElementById(`costPerPortion-${id}`);
    const sellingPriceSpan = document.getElementById(`sellingPrice-${id}`);
    const marginPercentSpan = document.getElementById(`marginPercent-${id}`);
    const totalIngCostSpan = document.getElementById(`totalIngCost-${id}`);
    const marginBar = document.getElementById(`marginBar-${id}`);

    let currentPortions = 12;
    let coeffVente = 3.5;
    let autoTimes = true;
    let currentPrepRaw = sauce.prepBase;
    let currentCookRaw = sauce.cookBase.toString();
    let currentDressRaw = sauce.dressBase;

    let ingredientsData = sauce.ingredients.map(ing => ({
      name: ing.name, unit: ing.unit, qty: ing.defaultQty, priceUnit: ing.defaultPrice
    }));

    function syncTimesToUI() {
      if (prepInput) prepInput.value = formatDuration(currentPrepRaw);
      if (dressInput) dressInput.value = formatDuration(currentDressRaw);
      if (cookInput) cookInput.value = currentCookRaw;
    }
    function syncTimesFromUI() {
      if (prepInput) { let m=parseDurationToMinutes(prepInput.value); if(!isNaN(m)) currentPrepRaw=m; else currentPrepRaw=prepInput.value; }
      if (dressInput) { let m=parseDurationToMinutes(dressInput.value); if(!isNaN(m)) currentDressRaw=m; else currentDressRaw=dressInput.value; }
      if (cookInput) currentCookRaw = cookInput.value;
    }
    function applyAutoTimes() {
      if (!autoTimes) return;
      const ratio = currentPortions / 12;
      currentPrepRaw = Math.round(sauce.prepBase * ratio);
      currentDressRaw = Math.round(sauce.dressBase * ratio);
      syncTimesToUI();
    }
    function updateQuantitiesByPortions() {
      const factor = currentPortions / 12;
      for (let i=0; i<ingredientsData.length; i++) ingredientsData[i].qty = sauce.ingredients[i].defaultQty * factor;
      renderIngredientTable();
      updateAllCosts();
    }
    function renderIngredientTable() {
      tbody.innerHTML = '';
      for (let i=0; i<ingredientsData.length; i++) {
        const ing = ingredientsData[i];
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="font-weight:600">${escapeHtml(ing.name)}</td>
          <td><input type="number" class="ni qty" data-idx="${i}" value="${ing.qty.toFixed(2)}" step="0.01" style="width:85px;"> <span class="small-unit">${ing.unit}</span></td>
          <td><input type="number" class="ni a" data-idx="${i}" value="${ing.priceUnit.toFixed(2)}" step="0.10" style="width:78px;"></td>
          <td class="unit-price-display" style="text-align:right">${ing.priceUnit.toFixed(2)} €/unit</td>
          <td class="line-total" style="text-align:right;font-weight:600">${(ing.qty * ing.priceUnit).toFixed(2)} €</td>
        `;
        tbody.appendChild(tr);
        tr.querySelector('.qty').addEventListener('input', () => updateFromInputs());
        tr.querySelector('.a').addEventListener('input', () => updateFromInputs());
      }
    }
    function updateFromInputs() {
      const rows = tbody.querySelectorAll('tr');
      for (let i=0; i<rows.length; i++) {
        const row = rows[i];
        const qty = parseFloat(row.querySelector('.qty').value) || 0;
        const price = parseFloat(row.querySelector('.a').value) || 0;
        ingredientsData[i].qty = qty;
        ingredientsData[i].priceUnit = price;
        row.querySelector('.unit-price-display').innerText = price.toFixed(2)+' €/unit';
        row.querySelector('.line-total').innerText = (qty * price).toFixed(2)+' €';
      }
      updateAllCosts();
    }
    function updateAllCosts() {
      let total = 0;
      for (let ing of ingredientsData) total += ing.qty * ing.priceUnit;
      const costPer = total / currentPortions;
      const pvTotal = costPer * coeffVente * currentPortions;
      const margin = (pvTotal - total) / pvTotal * 100;
      totalCostSpan.innerText = total.toFixed(2)+' €';
      costPerPortionSpan.innerText = costPer.toFixed(2)+' €';
      sellingPriceSpan.innerText = pvTotal.toFixed(2)+' €';
      marginPercentSpan.innerText = margin.toFixed(1)+'%';
      totalIngCostSpan.innerText = total.toFixed(2)+' €';
      if (marginBar) {
        let w = Math.min(100, Math.max(0, margin));
        marginBar.style.width = w+'%';
        marginBar.style.background = margin>65?'#1D9E75':(margin>40?'#EF9F27':'#E24B4A');
      }
    }
    function onPortionsChange() {
      let newP = parseInt(portionsInput.value) || 1;
      currentPortions = newP;
      portionLabel.innerText = currentPortions;
      qtyLabels.forEach(lbl => lbl.innerText = currentPortions);
      updateQuantitiesByPortions();
      if (autoTimes) applyAutoTimes();
      saveToLocal();
    }
    function onCoeffChange() { coeffVente = parseFloat(coeffInput.value) || 3.0; updateAllCosts(); saveToLocal(); }
    function onAutoChange() { autoTimes = autoCheckbox.checked; if (autoTimes) applyAutoTimes(); saveToLocal(); }
    function onTimeChange() { syncTimesFromUI(); if (autoTimes) { autoCheckbox.checked = false; autoTimes = false; } saveToLocal(); }
    function saveToLocal() {
      syncTimesFromUI();
      const saveData = { portions:currentPortions, coeff:coeffVente, ingredients:ingredientsData.map(i=>({qty:i.qty, priceUnit:i.priceUnit})), times:{prep:currentPrepRaw, cook:currentCookRaw, dress:currentDressRaw}, autoTimes };
      localStorage.setItem(`escoffier_${id}`, JSON.stringify(saveData));
    }
    function loadFromLocal() {
      const saved = localStorage.getItem(`escoffier_${id}`);
      if (saved) {
        try {
          const data = JSON.parse(saved);
          if (data.portions) currentPortions = data.portions;
          if (data.coeff) coeffVente = data.coeff;
          if (data.ingredients) {
            for (let i=0; i<ingredientsData.length; i++) {
              if (data.ingredients[i].qty !== undefined) ingredientsData[i].qty = data.ingredients[i].qty;
              if (data.ingredients[i].priceUnit !== undefined) ingredientsData[i].priceUnit = data.ingredients[i].priceUnit;
            }
          }
          if (data.times) {
            currentPrepRaw = data.times.prep ?? sauce.prepBase;
            currentCookRaw = data.times.cook ?? sauce.cookBase.toString();
            currentDressRaw = data.times.dress ?? sauce.dressBase;
          }
          if (data.autoTimes !== undefined) autoTimes = data.autoTimes;
          portionsInput.value = currentPortions;
          coeffInput.value = coeffVente;
          autoCheckbox.checked = autoTimes;
          portionLabel.innerText = currentPortions;
          qtyLabels.forEach(lbl => lbl.innerText = currentPortions);
          syncTimesToUI();
          renderIngredientTable();
          updateAllCosts();
        } catch(e) {}
      } else {
        renderIngredientTable();
        updateAllCosts();
        if (autoTimes) applyAutoTimes();
      }
    }
    portionsInput.addEventListener('input', onPortionsChange);
    coeffInput.addEventListener('input', onCoeffChange);
    autoCheckbox.addEventListener('change', onAutoChange);
    if (prepInput) prepInput.addEventListener('input', onTimeChange);
    if (cookInput) cookInput.addEventListener('input', onTimeChange);
    if (dressInput) dressInput.addEventListener('input', onTimeChange);
    loadFromLocal();
  });
</script>
</body>
</html>
